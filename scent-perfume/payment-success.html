<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Оплата прошла — Scent Perfume Bar</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/logo-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/payment-status.css" />
</head>
<body ontouchstart="">

  <header class="header scrolled" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-text">SCENT</span>
        <span class="nav__logo-dot">✦</span>
        <span class="nav__logo-text">PERFUME BAR</span>
      </a>
      <div class="nav__actions">
        <a href="login.html" class="nav__profile" id="navProfile" aria-label="Профиль">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </a>
        <a href="cart.html" class="nav__cart" aria-label="Корзина">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
          <span class="nav__cart-count" id="cartCount">0</span>
        </a>
      </div>
    </nav>
  </header>

  <main class="payment-status-main">
    <div class="payment-status-card payment-status-card--success">

      <div class="payment-status__icon payment-status__icon--success">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>

      <h1 class="payment-status__title">Оплата прошла успешно</h1>
      <p class="payment-status__sub" id="statusText">Ваш заказ оплачен и принят в обработку.</p>

      <div class="payment-status__order" id="orderInfo" style="display:none">
        <div class="payment-status__order-row">
          <span>Номер заказа</span>
          <span id="orderIdDisplay">—</span>
        </div>
        <div class="payment-status__order-row">
          <span>Сумма оплаты</span>
          <span id="orderAmountDisplay">—</span>
        </div>
        <div class="payment-status__order-row">
          <span>Статус</span>
          <span class="payment-status__badge payment-status__badge--paid">Оплачено</span>
        </div>
      </div>

      <p class="payment-status__note">
        Менеджер свяжется с вами в течение 30 минут для подтверждения деталей доставки.
      </p>

      <div class="payment-status__actions">
        <a href="account.html" class="btn btn--gold">Мои заказы</a>
        <a href="catalog.html" class="btn btn--outline">Продолжить покупки</a>
      </div>

    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Читаем параметры из URL: ?order_id=123&amount=50000
      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('order_id');
      const amount  = params.get('amount');

      if (orderId) {
        document.getElementById('orderInfo').style.display = 'block';
        document.getElementById('orderIdDisplay').textContent = '#' + orderId;
      }
      if (amount) {
        document.getElementById('orderAmountDisplay').textContent =
          parseInt(amount).toLocaleString('ru') + ' ₸';
      }

      // Очищаем корзину
      localStorage.removeItem('scent_cart');
      if (typeof updateCartCount === 'function') updateCartCount();
    });
  </script>
</body>
</html>
