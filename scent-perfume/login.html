<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход — Scent Perfume Bar</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <meta name="theme-color" content="#0a0a0a" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>

  <header class="header scrolled" id="header">
    <nav class="nav container">
      <a href="index.html" class="nav__logo">
        <span class="nav__logo-text">SCENT</span>
        <span class="nav__logo-dot">✦</span>
        <span class="nav__logo-text">PERFUME</span>
      </a>
      <ul class="nav__links" id="navLinks">
        <li><a href="catalog.html" class="nav__link">Каталог</a></li>
        <li>
          <a href="cart.html" class="nav__cart" aria-label="Корзина">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
            <span class="nav__cart-count" id="cartCount">0</span>
          </a>
        </li>
      </ul>
    </nav>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-logo">
        <span>SCENT</span>
        <span class="auth-logo__dot">✦</span>
        <span>PERFUME</span>
      </div>

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab auth-tab--active" id="tabLogin">Войти</button>
        <button class="auth-tab" id="tabRegister">Регистрация</button>
      </div>

      <!-- LOGIN FORM -->
      <div id="formLogin">
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com" autocomplete="email" />
          <span class="form-error" id="loginEmailErr"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Пароль</label>
          <div class="input-password-wrap">
            <input type="password" id="loginPassword" class="form-input" placeholder="Ваш пароль" autocomplete="current-password" />
            <button class="toggle-password" data-target="loginPassword" aria-label="Показать пароль">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error" id="loginPasswordErr"></span>
        </div>
        <span class="form-error auth-error" id="loginError"></span>
        <button class="btn btn--gold auth-submit" id="loginBtn">Войти</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="formRegister" style="display:none">
        <div class="form-group">
          <label class="form-label" for="regName">Имя <span class="req">*</span></label>
          <input type="text" id="regName" class="form-input" placeholder="Ваше имя" autocomplete="given-name" maxlength="60" />
          <span class="form-error" id="regNameErr"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email <span class="req">*</span></label>
          <input type="email" id="regEmail" class="form-input" placeholder="your@email.com" autocomplete="email" />
          <span class="form-error" id="regEmailErr"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPassword">Пароль <span class="req">*</span></label>
          <div class="input-password-wrap">
            <input type="password" id="regPassword" class="form-input" placeholder="Минимум 6 символов" autocomplete="new-password" />
            <button class="toggle-password" data-target="regPassword" aria-label="Показать пароль">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="form-error" id="regPasswordErr"></span>
        </div>
        <span class="form-error auth-error" id="regError"></span>
        <button class="btn btn--gold auth-submit" id="registerBtn">Создать аккаунт</button>
      </div>

      <!-- SUCCESS MESSAGE (after register) -->
      <div id="authSuccess" style="display:none" class="auth-success">
        <div class="auth-success__icon">✦</div>
        <h3>Добро пожаловать!</h3>
        <p id="authSuccessText"></p>
        <a href="account.html" class="btn btn--gold" style="width:100%;justify-content:center;margin-top:8px">
          Перейти в кабинет
        </a>
      </div>

    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
